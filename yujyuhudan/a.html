<style>

  :root {

  body {

      radial-gradient(circle at top, #fff7e8 0, #f4f1ea 45%, #ebe1d2 100%);

  .app {

    justify-content: center;

  .screen {
    width: 100%;
    display: none;
  }

  .screen.active {
    display: block;
  }

  .card {
    background: rgba(255, 250, 240, 0.96);
    border: 1px solid var(--line);
    border-radius: 24px;

  h1 {

  .row {

  .grid {

    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

  .grid.two {
    grid-template-columns: repeat(2, 1fr);
  }

  button {
    border: 1px solid var(--accent);

    padding: 13px 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  button:active {
    transform: translateY(1px);
  }

  .ghost {
    background: transparent;
    color: var(--accent);
  }

  .wide {
    width: 100%;
    margin-top: 14px;
  }

  input, textarea {
    width: 100%;

    padding: 13px 14px;
    font-size: 16px;
    outline: none;
  }

  textarea {
    min-height: 110px;
    resize: vertical;
    line-height: 1.7;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
  }

  .input-with-button {
    display: grid;
    grid-template-columns: 1fr 70px;
    gap: 8px;
    margin-top: 14px;
  }

  .topline {
    min-height: 28px;
    margin-bottom: 18px;
    color: var(--sub);
    font-size: 14px;
    line-height: 1.7;
  }

  .sentence {
    margin: 0 0 18px;
    padding: 12px 14px;
    background: var(--accent2);
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
  }

  .history-area {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }

  .history-area.open {
    display: block;
  }

  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .history-list button {
    padding-inline: 14px;
  }

  .error {
    min-height: 24px;
    margin-top: 10px;
    color: var(--danger);
    font-weight: 700;
    font-size: 13px;
  }

  .result-rank {
    display: inline-block;

  .importance {

  }

  .result-text {

    font-size: 18px;
    line-height: 1.9;
    font-weight: 700;
  }

  .small-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 18px;
  }

  .mode-tabs {

    gap: 8px;
    margin-top: 18px;
  }

  .mode-tabs button {
    border-radius: 16px;

  .back {

    font-size: 13px;
  }

  .empty {
    color: var(--sub);
    font-size: 14px;
  }

    top: 14px;
    right: 14px;

    height: 46px;

    padding: 0;

    border-radius: 14px;
  }

  .runner {
    position: absolute;
    left: 0%;
    top: -30px;
    width: 28px;
    height: 38px;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 5;
  }

  .runner-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .runner-head-svg {
    fill: #111;
    stroke: #f5f1e8;

  }

  .runner-leg-svg {
    stroke: #f5f1e8;
    stroke-width: 3;
    stroke-linecap: round;
    fill: none;
  }

  .runner-arm-left-svg {
    transform-origin: 16px 16px;
    animation: svgArmLeftRun 0.42s infinite ease-in-out;
  }

  .runner-arm-right-svg {
    transform-origin: 16px 16px;
    animation: svgArmRightRun 0.42s infinite ease-in-out;
  }

  .runner-leg-left-svg {
    transform-origin: 16px 25px;

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>
<div id="menuPanel" class="menu-panel">
  <button onclick="menuGo('who')">普通に聞かせる</button>
  <button class="ghost" onclick="menuGo('natural')">まとめて話す</button>
  <button class="ghost" onclick="menuGo('history')">前の相談</button>
</div>

<div class="app">

  <section id="start" class="screen active">
    <div class="card">
      <h1>決められないなら<br>私が決める。</h1>
      <button class="wide start-btn" onclick="startStepMode()">聞かせる</button>
    </div>
  </section>

  <section id="natural" class="screen">
    <div class="card">
      <button class="ghost back" onclick="go('start')">戻る</button>
      <h2>投げろ</h2>
      <textarea id="naturalText" placeholder="友達に〇〇を勧められた"></textarea>
      <button class="wide" onclick="judgeNatural()">判定</button>
      <div id="naturalError" class="error"></div>
    </div>
  </section>

  <section id="who" class="screen">
    <div class="card">
      <button class="ghost back" onclick="go('start')">戻る</button>
      <div id="sentenceWho" class="sentence"></div>
      <h2>誰が？</h2>
      <div class="grid">
        <button onclick="selectWho('家族', '家族')">家族</button>

<script>

  "軽い": 10,
  "普通": 0,

};

  "入る": 12,
  "まあ入る": 5,

const defaultItems = ["漫画", "アニメ", "映画", "ゲーム", "曲", "動画", "本", "店", "アプリ"];

function go(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));

function startStepMode() {

  go("who");
}

function clearErrors() {
  ["whoError", "itemError", "naturalError", "saveMessage"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = "";
  });
}

function getList(key) {
  try { return JSON.parse(localStorage.getItem(key) || "[]"); }
  catch { return []; }
}

function setList(key, list) {
  localStorage.setItem(key, JSON.stringify(list));
}

function addUnique(key, value) {
  const v = value.trim();
  if (!v) return;
  const list = getList(key);
  if (!list.includes(v)) {
    list.unshift(v);
    setList(key, list.slice(0, 20));
  }
}

function toggleHistory(id) {
  const el = document.getElementById(id);

}

function renderResultHistory() {

  if (list.length === 0) {
    const empty = document.createElement("div");

    return;

    btn.addEventListener("click", () => openReview(index));

    const left = document.createElement("span");

    right.className = "history-sub";

    }

    box.appendChild(btn);

function selectWho(label, type) {

  current.whoType = type;

}

    document.getElementById("whoError").textContent = "誰だよ";
    return;
  }
  const name = value.endsWith("さん") ? value : value + "さん";
  input.value = "";
  selectWho(name, "名前入力");
}

function selectItem(label, type) {
  current.item = label;
  current.itemType = type;
  if (type === "自由入力" && !defaultItems.includes(label)) addUnique(STORAGE_KEYS.item, label);
  go("mood");
}

function selectTypedItem() {
  const input = document.getElementById("itemName");
  const value = input.value.trim();
  if (!value) {
    document.getElementById("itemError").textContent = "何を勧められたんだよ";
    return;
  }
  input.value = "";
  selectItem(value, defaultItems.includes(value) ? value : "自由入力");
}

function markSelected(btn, group) {
  document.querySelectorAll(`button[data-group="${group}"]`).forEach(b => b.classList.remove("selected"));
  if (btn) btn.classList.add("selected");
}

function selectPressure(key, value, btn) {
  current[key] = value;
  markSelected(btn, key);
  if (current.heat && current.refusal && current.repeat) {
    setTimeout(() => go("feeling"), 120);
  }
}

function selectSelf(key, value, btn) {
  current[key] = value;
  markSelected(btn, key);
  if (current.interest && current.weight && current.capacity) {
    setTimeout(() => judgeCurrent(), 120);
  }
}

function judgeNatural() {
  const text = document.getElementById("naturalText").value.trim();
  if (!text) {
    document.getElementById("naturalError").textContent = "なんか書いて";
    return;
  }

  current = { ...defaultState };
  current.sourceText = text;

  const who = detectWho(text);
  current.who = who.label;
  current.whoType = who.type;

  const item = detectItem(text);
  current.item = item.label;
  current.itemType = item.type;

  const pressure = detectPressure(text);
  current.heat = pressure.heat;
  current.refusal = pressure.refusal;
  current.repeat = pressure.repeat;

  const self = detectSelf(text);
  current.interest = self.interest;
  current.weight = self.weight;
  current.capacity = self.capacity;

  judgeCurrent();
}

function detectWho(text) {
  const rules = [
    { words: ["親友"], label: "親友", type: "親友" },
    { words: ["友達", "友人", "フレンド"], label: "友達", type: "友達" },
    { words: ["家族", "母", "父", "兄", "姉", "弟", "妹"], label: "家族", type: "家族" },
    { words: ["先生", "教授"], label: "先生", type: "先生" },
    { words: ["先輩", "後輩", "知人", "同僚", "バイト先"], label: "知人", type: "知人" },
    { words: ["他人", "知らない人", "知らん人"], label: "他人", type: "他人" }
  ];
  for (const rule of rules) {
    if (rule.words.some(w => text.includes(w))) return { label: rule.label, type: rule.type };
  }
  const nameMatch = text.match(/(.+?)さんに/);
  if (nameMatch && nameMatch[1].length <= 10) {
    return { label: nameMatch[1] + "さん", type: "名前入力" };
  }
  return { label: "勧めてきた人", type: "不明" };
}

function detectItem(text) {
  const typeRules = [
    { words: ["漫画", "マンガ", "コミック", "単行本"], label: "漫画", type: "漫画" },
    { words: ["アニメ", "TVアニメ", "anime"], label: "アニメ", type: "アニメ" },
    { words: ["映画", "邦画", "洋画", "ムービー"], label: "映画", type: "映画" },
    { words: ["ゲーム", "Switch", "PS5", "Steam", "ソシャゲ"], label: "ゲーム", type: "ゲーム" },
    { words: ["曲", "音楽", "歌", "アルバム", "MV"], label: "曲", type: "曲" },
    { words: ["動画", "YouTube", "配信", "実況"], label: "動画", type: "動画" },
    { words: ["小説", "書籍", "ラノベ", "本"], label: "本", type: "本" },
    { words: ["店", "ラーメン", "カフェ", "レストラン", "居酒屋"], label: "店", type: "店" },
    { words: ["アプリ", "ツール", "サービス"], label: "アプリ", type: "アプリ" }
  ];
  let detected = { label: "何か", type: "不明" };
  for (const rule of typeRules) {
    if (rule.words.some(w => text.includes(w))) {
      detected = { label: rule.label, type: rule.type };
      break;
    }
  }
  const title = extractTitle(text);
  if (title) detected.label = title;
  return detected;
}

function extractTitle(text) {
  let m = text.match(/に(.+?)という/);
  if (m) return cleanTitle(m[1]);
  m = text.match(/に(.+?)を/);
  if (m) return cleanTitle(m[1]);
  m = text.match(/「(.+?)」/);
  if (m) return cleanTitle(m[1]);
  return "";
}

function cleanTitle(value) {
  return value.replace(/友達|親友|家族|先生|先輩|後輩|知人|他人|知らない人|母|父|兄|姉|弟|妹|さん/g, "").trim();
}

function detectPressure(text) {
  let heat = "恋愛相談";
  let refusal = "スルー";
  let repeat = "初回";

  if (text.includes("宇宙") || text.includes("人生") || text.includes("世界変わる")) heat = "宇宙並み";
  else if (text.includes("事件") || text.includes("大事件") || text.includes("やばい")) heat = "事件並み";
  else if (text.includes("熱弁") || text.includes("めちゃくちゃ") || text.includes("真剣")) heat = "木刀対真剣";
  else if (text.includes("相談") || text.includes("本気")) heat = "恋愛相談";
  else if (text.includes("ノリ") || text.includes("軽く") || text.includes("なんとなく")) heat = "縦ノリ";

  if (text.includes("断れない") || text.includes("逃げ場") || text.includes("絶対") || text.includes("強制")) refusal = "出来ない";
  else if (text.includes("面倒") || text.includes("めんど") || text.includes("圧") || text.includes("聞かれそう")) refusal = "面倒くさそう";

  if (text.includes("何回目") || text.includes("しつこい") || text.includes("何度も") || text.includes("何回も")) repeat = "何回目だよ";
  else if (text.includes("前も") || text.includes("また") || text.includes("前にも")) repeat = "前も言ってた";

  return { heat, refusal, repeat };
}

function detectSelf(text) {
  let interest = "別に";
  let weight = "普通";
  let capacity = "まあ入る";

  if (text.includes("気になる") || text.includes("面白そう") || text.includes("良さそう")) interest = "ある";
  if (text.includes("ちょっと") || text.includes("少し")) interest = "ちょいある";
  if (text.includes("興味ない") || text.includes("興味無い")) interest = "ない";

  if (text.includes("軽い") || text.includes("すぐ") || text.includes("短い")) weight = "軽い";
  if (text.includes("重い") || text.includes("長い") || text.includes("時間かかる")) weight = "重い";
  if (text.includes("無理") || text.includes("きつい")) weight = "無理";

  if (text.includes("今いける") || text.includes("余裕")) capacity = "入る";
  if (text.includes("今きつい") || text.includes("忙しい")) capacity = "今きつい";
  if (text.includes("一切") || text.includes("入らん") || text.includes("入らない")) capacity = "一切入らん";

  return { interest, weight, capacity };
}

function judgeCurrent() {
  const score = calcScore(current);
  const rank = getRank(score);
  current.rank = rank;
  current.importance = importanceLabels[rank];
  current.resultText = makeResultText(rank, current);

  runJudging(rank, () => {
    showResult();
  });
}

function showResult() {
  document.getElementById("resultRank").textContent = "判定：" + current.rank;
  document.getElementById("resultImportance").textContent = "重要度：" + current.importance;
  document.getElementById("resultText").textContent = current.resultText;
  renderEvidence();
  go("result");
}

function runJudging(rank, done) {
  const title = document.getElementById("judgingTitle");
  const linesBox = document.getElementById("judgingLines");
  if (!title || !linesBox) {
    done();
    return;
  }

  title.textContent = getJudgingTitle(rank);
  linesBox.innerHTML = "";
  excuseCount = 0;

  const loadExcuse = document.getElementById("loadExcuse");
  const slowQuestion = document.getElementById("slowQuestion");
  const excuseBtn = document.getElementById("excuseBtn");
  const resultBtn = document.getElementById("showResultBtn");
  const loadBar = document.getElementById("loadBar");
  const loadPercent = document.getElementById("loadPercent");

  if (loadExcuse) {
    loadExcuse.textContent = "";
    loadExcuse.style.display = "none";
  }
  if (slowQuestion) slowQuestion.style.display = "none";
  if (excuseBtn) excuseBtn.style.display = "none";
  if (resultBtn) resultBtn.style.display = "none";
  if (loadBar) loadBar.style.width = "0%";
  if (loadPercent) loadPercent.textContent = "0%";

  go("judging");

  const lines = getJudgingLines(rank);
  lines.forEach((line, index) => {
    setTimeout(() => {
      const div = document.createElement("div");
      div.className = "judging-line";
      div.textContent = line;
      linesBox.appendChild(div);
    }, 620 * index);
  });

  runLoadGauge();

  setTimeout(() => {
    revealElement(slowQuestion);
    revealElement(excuseBtn);
  }, 6000);
}

function revealElement(el) {
  if (!el) return;
  el.style.display = "block";
  el.classList.remove("fade-in");
  void el.offsetWidth;
  el.classList.add("fade-in");
}

function runLoadGauge() {
  const bar = document.getElementById("loadBar");
  const percent = document.getElementById("loadPercent");
  const runner = document.getElementById("runner");
  if (!bar || !percent || !runner) return;

  let value = 0;
  runner.style.left = "0%";

  const timer = setInterval(() => {
    if (value >= 80) {
      clearInterval(timer);
      value = 80;
    } else {
      value += Math.ceil(Math.random() * 7);
      if (value > 80) value = 80;
    }

    bar.style.width = value + "%";
    percent.textContent = value + "%";
    runner.style.left = value + "%";
  }, 180);
}

function completeLoadGauge() {
  const bar = document.getElementById("loadBar");
  const percent = document.getElementById("loadPercent");
  const runner = document.getElementById("runner");

  if (bar) bar.style.width = "100%";
  if (percent) percent.textContent = "100%";
  if (runner) runner.style.left = "100%";
}

function generateLoadExcuse() {
  const box = document.getElementById("loadExcuse");
  const resultBtn = document.getElementById("showResultBtn");
  if (!box) return;

  const timeframes = [
    "今朝", "今日", "今日の朝", "出勤途中", "出発前", "家を出た後", "到着直前",
    "電車の中", "バスの中"
  ];

  const locations = [
    "道端で", "駅前で", "バス停で", "交差点で", "歩道で", "横断歩道で", "エレベーター内で",
    "階段で", "地下道で", "路地で", "公園で", "コンビニの前で", "信号待ち中に", "駐車場で",
    "改札口で", "ホームで", "車内で", "玄関で"
  ];

  const subjects = [
    "お年寄り", "転んだ子供", "落とし物", "迷子", "急病人", "交通事故", "具合の悪い人",
    "閉じ込められた人", "倒れている人", "観光客", "壊れた傘", "落ちた携帯電話", "電車",
    "壊れた目覚まし時計", "故障したパソコン", "パンクした自転車", "故障したエレベーター",
    "壊れた信号機", "体調不良のバス運転手", "悪天候", "電池切れのスマートウォッチ"
  ];

  const actions = [
    "道案内をしていて", "助けを求めていて", "落ちていて", "探されていて", "救急車を待っていて",
    "現場検証をしていて", "介抱されていて", "救出を待っていて", "拾われるのを待っていて",
    "交番に届けられていて", "遅延していて", "壊れていて", "動かなくなっていて", "故障していて",
    "パンクしていて", "停止していて", "体調不良になっていて", "電池切れになっていて", "悪化していて"
  ];

  const t = timeframes[Math.floor(Math.random() * timeframes.length)];
  const l = locations[Math.floor(Math.random() * locations.length)];
  const s = subjects[Math.floor(Math.random() * subjects.length)];
  const a = actions[Math.floor(Math.random() * actions.length)];

  const excuse = `${t}、${l}${s}が${a}、遅刻してしまいました。`;
  current.loadExcuse = excuse;
  box.textContent = excuse;
  revealElement(box);

  if (resultBtn) {
    resultBtn.style.display = "none";
    setTimeout(() => {
      completeLoadGauge();
      revealElement(resultBtn);
    }, 3000);
  }
}

function getJudgingTitle(rank) {
  if (rank === "S") return "終わりです。";
  if (rank === "E") return "忘れていいか確認";
  return "考え中";
}

  if (rank === "S") {
    return [
      "反論を確認中…",

      "終わりです。"
    ];
  }

  if (rank === "E") {
    return [

    ];
  }

  if (rank === "A") {
    return [
      "言い訳を確認中…",

    ];
  }

  if (rank === "B") {
    return [

    ];

  if (rank === "C") {
    return [

function renderEvidence() {
  const box = document.getElementById("evidenceBox");
  if (!box) return;

  const items = [
    current.who || "誰か",
    current.item || "何か",
    current.heat || "熱量不明",
    current.refusal || "断りにくさ不明",
    current.repeat || "回数不明",
    current.interest || "興味不明",
    current.weight || "重さ不明",
    current.capacity || "余裕不明"
  ].filter(Boolean);

  box.innerHTML = "";

  const title = document.createElement("div");
  title.className = "evidence-title";
  title.textContent = "覚えたこと";
  box.appendChild(title);

  const wrap = document.createElement("div");
  wrap.className = "evidence-items";

  items.forEach(value => {
    const span = document.createElement("span");
    span.className = "evidence-item";
    span.textContent = value;
    wrap.appendChild(span);
  });

  box.appendChild(wrap);
}

function calcScore(data) {
  let score = 35;
  score += whoScores[data.whoType] ?? 0;
  score += itemScores[data.itemType] ?? 0;

  const heat = heatScores[data.heat] ?? 4;
  const refusal = refusalScores[data.refusal] ?? -6;
  const repeat = repeatScores[data.repeat] ?? 0;
  const interest = interestScores[data.interest] ?? 0;
  const weight = weightScores[data.weight] ?? 0;
  const capacity = capacityScores[data.capacity] ?? 5;

  score += interest;
  score += weight;
  score += capacity;

  const pressureTotal = heat + refusal + repeat;

  if (data.interest === "ある" || data.interest === "ちょいある") {
    score += Math.round(pressureTotal * 0.65);
  } else if (data.interest === "ない") {
    score -= Math.round(Math.max(pressureTotal, 0) * 0.65);
  } else {
    score += Math.round(pressureTotal * 0.25);
  }

  if (data.interest === "ない") score = Math.min(score, 54);
  if (data.weight === "無理") score = Math.min(score, 44);
  if (data.capacity === "一切入らん") score = Math.min(score, 39);
  if (data.whoType === "他人" && data.itemType === "アプリ") score = Math.min(score, 28);

  if ((data.interest === "ある" || data.interest === "ちょいある") && data.weight === "軽い" && data.capacity === "入る") {
    score = Math.max(score, 58);
  }

  return score;
}

function getRank(score) {
  if (score >= 85) return "S";
  if (score >= 70) return "A";
  if (score >= 55) return "B";
  if (score >= 40) return "C";
  if (score >= 25) return "D";
  return "E";
}

}

function saveResult() {
  if (!current.rank) return;
  const list = getList(STORAGE_KEYS.results);
  const summary = makeSummary(current);
  list.unshift({
    rank: current.rank,
    importance: current.importance,
    summary,
    who: current.who || "勧めてきた人",
    whoType: current.whoType || "不明",
    item: current.item || "",
    review: "",
    loadExcuse: current.loadExcuse || "",
    createdAt: new Date().toISOString()
  });
  setList(STORAGE_KEYS.results, list.slice(0, 30));
  document.getElementById("saveMessage").textContent = "覚えといた";
  renderResultHistory();
}


function openReview(index) {
  const list = getList(STORAGE_KEYS.results);
  const item = list[index];
  if (!item) return;

  selectedReviewIndex = index;
  document.getElementById("reviewTarget").textContent = item.summary;

  const reviewExcuse = document.getElementById("reviewExcuse");
  if (reviewExcuse) {
    if (item.loadExcuse) {
      reviewExcuse.textContent = `遅い原因：${item.loadExcuse}`;
      reviewExcuse.style.display = "block";
    } else {
      reviewExcuse.textContent = "";
      reviewExcuse.style.display = "none";
    }
  }

  go("review");
}

function answerReview(value) {
  const list = getList(STORAGE_KEYS.results);
  const item = list[selectedReviewIndex];
  if (!item) return;

  item.review = value;
  list[selectedReviewIndex] = item;
  setList(STORAGE_KEYS.results, list);

  document.getElementById("reviewResultTarget").textContent = item.summary;

  const resultExcuse = document.getElementById("reviewResultExcuse");
  if (resultExcuse) {
    if (item.loadExcuse) {
      resultExcuse.textContent = `遅い原因：${item.loadExcuse}`;
      resultExcuse.style.display = "block";
    } else {
      resultExcuse.textContent = "";
      resultExcuse.style.display = "none";
    }
  }

  document.getElementById("reviewReply").textContent = getReviewReply(value, item.who);
  renderResultHistory();
  go("reviewResult");
}

function getReviewReply(value, who) {
  const name = who || "あいつ";

  if (value === "良い") {
    return br([
      "良かったの！？",
      "ふーん、あいつも",
      "結構やるじゃん？",
      "私程じゃないけど…？"
    ]);
  }

  if (value === "普通") {
    return br([
      "まぁ…そうゆう日も",
      "あるよね！",
      `${name}のこと`,
      "話さないでおく！",
      "元気だしてこ！",
      "",
      `そういえば${name}って…`,
      "あ。"
    ]);
  }

  return br([
    "え〜最悪じゃん〜",
    "適当言ってるよね〜、",
    "私暇じゃねぇっつーの。",
    "",
    "でも安心して、",
    "私覚えてるから！"
  ]);
}

function makeSummary(data) {
  if (data.sourceText) return data.sourceText;
  if (!data.who && !data.item) return "";
  if (data.who && !data.item) return `${data.who}に`;
  if (data.who && data.item) return `${data.who}に${data.item}を勧められた`;
  if (!data.who && data.item) return `${data.item}を`;
  return "";
}

function resetApp() {
  current = { ...defaultState };
  const n = document.getElementById("naturalText");
  if (n) n.value = "";
  document.querySelectorAll("button.selected").forEach(b => b.classList.remove("selected"));
  go("start");
}

function renderSentence() {
  const text = makeSummary(current);
  ["sentenceWho", "sentenceItem", "sentenceMood", "sentenceFeeling"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    el.style.display = text ? "block" : "none";
  });
}

document.addEventListener("DOMContentLoaded", () => {
  const whoInput = document.getElementById("whoName");
  const itemInput = document.getElementById("itemName");
  const naturalInput = document.getElementById("naturalText");

  if (whoInput) whoInput.addEventListener("keydown", e => { if (e.key === "Enter") selectTypedWho(); });
  if (itemInput) itemInput.addEventListener("keydown", e => { if (e.key === "Enter") selectTypedItem(); });
  if (naturalInput) naturalInput.addEventListener("keydown", e => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") judgeNatural();
  });

  renderHistories();
});
